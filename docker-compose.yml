version: "3.8"

services:
  payment:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8001:80"
    env_file:
      - ./services/payment-service/.env
    volumes:
      - ./data:/app/data
  order:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8002:80"
    depends_on:
      - payment